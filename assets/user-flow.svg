  <text x="790" y="404" fill="#8a8a8a" font-size="10.5" text-anchor="middle">Anuluj / Usuń</text>

  <rect x="420" y="500" width="180" height="56" rx="12" fill="#e7e7e7" stroke="#a9a9a9"/>
